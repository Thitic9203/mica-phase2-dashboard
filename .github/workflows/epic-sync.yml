name: Epic Sync Check

on:
  schedule:
    - cron: '0 2 * * *'  # 9am Bangkok (UTC+7)
  workflow_dispatch: {}

jobs:
  check-epics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Google Sheet CSV
        run: |
          curl -sL -o /tmp/pt.csv \
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vRB8nluBjOwTBvg1jMZ_b0XasG0kq5OrNKWnmnrCSls3PdOttcrcSXCXHu0sISK8dQ9JmX5tBgNKjVV/pub?gid=1115838130&single=true&output=csv"

      - name: Compare and update epics
        id: sync
        run: python3 .github/scripts/epic-sync.py

      - name: Commit and deploy
        if: steps.sync.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.html
          git commit -m "Sync epics from Progress Tracker sheet: ${{ steps.sync.outputs.summary }}"
          git push
          npx wrangler pages deploy public --project-name=mica-phase2-dashboard --branch=main
